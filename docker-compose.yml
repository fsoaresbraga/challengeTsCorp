services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: challenge_tscorp_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - challenge_tscorp

  nginx:
    image: nginx:1.27-alpine
    container_name: challenge_tscorp_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - challenge_tscorp

  mysql:
    image: mysql:8.0
    container_name: challenge_tscorp_mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-proposal_api}
      MYSQL_USER: ${DB_USERNAME:-proposal}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - challenge_tscorp

networks:
  challenge_tscorp:
    driver: bridge

volumes:
  mysql_data:
    driver: local
